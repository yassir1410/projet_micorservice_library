# Identity (Indispensable pour trouver le fichier user-microservice.properties dans le repo)
spring.application.name=user-microservice

# Config Server Connection (Version Docker)
# On remplace localhost par le nom du conteneur 'config-server'
spring.cloud.config.uri=http://config-server:8888
spring.config.import=optional:configserver:http://config-server:8888

